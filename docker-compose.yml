services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk -X brokers=localhost:9092 cluster health --exit-when-healthy >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: sentiment_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: sentiment
    ports:
      - "5432:5432"
    volumes:
      - sentiment_pgdata:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  collector:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    container_name: sentiment_collector
    environment:
      # Use defaults so missing vars don't become ""
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}

      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sentiment}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}

      # Reddit + News (leave blank -> collector auto-disables those sources)
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-stock-emotional-analysis/0.1 (by u/your_username)}
      REDDIT_SUBREDDITS: ${REDDIT_SUBREDDITS:-}

      NEWS_API_KEY: ${NEWS_API_KEY:-}
      NEWS_QUERIES: ${NEWS_QUERIES:-}

      COLLECTOR_POLL_SECONDS: ${COLLECTOR_POLL_SECONDS:-30}
      REDDIT_LIMIT_PER_SUBREDDIT: ${REDDIT_LIMIT_PER_SUBREDDIT:-50}
      NEWS_PAGE_SIZE: ${NEWS_PAGE_SIZE:-50}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_started
    restart: unless-stopped

  enricher:
    build:
      context: .
      dockerfile: services/enricher/Dockerfile
    container_name: sentiment_enricher
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      TOPIC_RAW_POSTS: raw.posts
      TOPIC_ENRICHED_POSTS: enriched.posts
    depends_on:
      redpanda:
        condition: service_healthy
      collector:
        condition: service_started
    restart: unless-stopped

  aggregator:
    build:
      context: .
      dockerfile: services/aggregator/Dockerfile
    container_name: sentiment_aggregator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      TOPIC_ENRICHED_POSTS: enriched.posts

      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sentiment}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_started
      enricher:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: sentiment_api
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sentiment}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      aggregator:
        condition: service_started
    restart: unless-stopped

volumes:
  sentiment_pgdata:
