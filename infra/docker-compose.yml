# infra/docker-compose.yml

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"

  postgres:
    image: postgres:16-alpine
    container_name: sentiment_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: sentiment
    ports:
      - "5432:5432"
    volumes:
      - sentiment_pgdata:/var/lib/postgresql/data

  # --- App services ---

  collector:
    build:
      context: ..
      dockerfile: services/collector/Dockerfile
    container_name: sentiment_collector
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC_RAW_POSTS: raw.posts
    depends_on:
      - redpanda

  enricher:
    build:
      context: ..
      dockerfile: services/enricher/Dockerfile
    container_name: sentiment_enricher
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC_RAW_POSTS: raw.posts
      TOPIC_ENRICHED_POSTS: enriched.posts
    depends_on:
      - redpanda
      - collector

  aggregator:
    build:
      context: ..
      dockerfile: services/aggregator/Dockerfile
    container_name: sentiment_aggregator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC_ENRICHED_POSTS: enriched.posts
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sentiment
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    depends_on:
      - redpanda
      - postgres
      - enricher

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: sentiment_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sentiment
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - aggregator

volumes:
  sentiment_pgdata:
